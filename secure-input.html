<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure Password Input</title>
<style>
  body { font-family: sans-serif; display: flex; justify-content: center; padding: 40px; background: #f0f2f5; }
  .card { background: white; padding: 32px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
  h3 { margin: 0 0 20px; }

  .field-wrapper {
    position: relative;
    border: 2px solid #cbd5e1;
    border-radius: 8px;
    padding: 12px;
    background: white;
    cursor: text;
    transition: border-color 0.2s;
  }
  .field-wrapper:focus-within { border-color: #2563eb; }

  /* Dot display — what user sees */
  #dot-display {
    font-size: 22px;
    letter-spacing: 4px;
    min-height: 28px;
    color: #1e293b;
    pointer-events: none;
    user-select: none;
  }

  /*
    Real capture target:
    - transparent, sits over dot display
    - caret is visible so user knows it's focused
    - contenteditable so InputEvent fires
    - but visually shows nothing
  */
  #capture-field {
    position: absolute;
    inset: 0;
    padding: 12px;
    font-size: 22px;
    color: transparent;
    caret-color: #2563eb; /* visible caret */
    background: transparent;
    border: none;
    outline: none;
    z-index: 2;
  }

  .actions { display: flex; gap: 8px; margin-top: 12px; }

  button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
  }

  #submit-btn { background: #2563eb; color: white; }
  #clear-btn { background: #f1f5f9; color: #334155; }

  #status {
    margin-top: 16px;
    padding: 10px;
    border-radius: 6px;
    font-size: 13px;
    word-break: break-all;
    display: none;
  }
  #status.show { display: block; background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
  #status.error { display: block; background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }

  .strength-bar { margin-top: 10px; height: 4px; border-radius: 2px; background: #e2e8f0; }
  .strength-fill { height: 100%; border-radius: 2px; transition: width 0.3s, background 0.3s; width: 0; }

  .hint { font-size: 11px; color: #94a3b8; margin-top: 6px; }
</style>
</head>
<body>
<div class="card">
  <h3>🔒 Secure Password Input</h3>

  <div class="field-wrapper" id="field-wrapper">
    <div id="dot-display">&#8203;</div>
    <!--
      contenteditable div instead of <input>:
      - bypasses some keylogger hooks that target HTMLInputElement
      - InputEvent.data gives us the character AFTER it's composed
      - we immediately wipe its content after each character
    -->
    <div
      id="capture-field"
      contenteditable="true"
      spellcheck="false"
      autocorrect="off"
      autocapitalize="off"
      role="textbox"
      aria-label="Password"
      aria-multiline="false"
    ></div>
  </div>

  <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
  <div class="hint" id="hint">Start typing your password</div>

  <div class="actions">
    <button id="clear-btn" type="button">Clear</button>
    <button id="submit-btn" type="button">Submit</button>
  </div>

  <div id="status"></div>
</div>

<script>
(() => {
  'use strict';

  // ── Freeze references BEFORE any attacker script can override them ──
  const _addEventListener = EventTarget.prototype.addEventListener;
  const _defineProperty   = Object.defineProperty;
  const _getRandomValues  = crypto.getRandomValues.bind(crypto);
  const _subtle           = crypto.subtle;
  const _encode           = TextEncoder.prototype.encode.bind(new TextEncoder());
  const _decode           = TextDecoder.prototype.decode.bind(new TextDecoder());

  // ── State ──
  let encryptedChunks = [];  // { iv: Uint8Array, ciphertext: ArrayBuffer }[]
  let sessionKey      = null;
  let length          = 0;

  const captureField  = document.getElementById('capture-field');
  const dotDisplay    = document.getElementById('dot-display');
  const statusEl      = document.getElementById('status');
  const strengthFill  = document.getElementById('strength-fill');
  const hintEl        = document.getElementById('hint');

  // ── 1. Generate non-extractable AES-GCM session key ──
  async function init() {
    sessionKey = await _subtle.generateKey(
      { name: 'AES-GCM', length: 256 },
      false,               // non-extractable — JS cannot read raw key bytes
      ['encrypt', 'decrypt']
    );
  }

  // ── 2. Encrypt a single character immediately ──
  async function encryptChar(char) {
    const iv         = _getRandomValues(new Uint8Array(12));
    const ciphertext = await _subtle.encrypt(
      { name: 'AES-GCM', iv },
      sessionKey,
      _encode(char)
    );
    return { iv, ciphertext };
  }

  // ── 3. Decrypt all chunks (only at submit time) ──
  async function decryptAll() {
    const chars = await Promise.all(
      encryptedChunks.map(async ({ iv, ciphertext }) => {
        const buf = await _subtle.decrypt(
          { name: 'AES-GCM', iv },
          sessionKey,
          ciphertext
        );
        return _decode(buf);
      })
    );
    return chars.join('');
  }

  // ── 4. Core: intercept InputEvent instead of keydown ──
  //
  //  WHY InputEvent.data instead of e.key:
  //  - keydown/keyup fire BEFORE the character is committed — easy to hook
  //  - InputEvent fires AFTER the character is inserted into the DOM
  //  - We immediately wipe the DOM content, so plaintext exposure is ~1 frame
  //  - Most keyloggers hook addEventListener('keydown') — this sidesteps that
  //
  _addEventListener.call(captureField, 'input', async (e) => {
    e.stopImmediatePropagation(); // stop other listeners from reading this

    const char = e.data; // the actual character typed

    // Immediately wipe the field — plaintext lives for < 1 frame
    captureField.textContent = '';

    if (!char || !sessionKey) return;

    await encryptChar(char).then(chunk => {
      encryptedChunks.push(chunk);
      length++;
      updateDisplay();
    });
  }, true); // capture phase — fires before bubble phase listeners

  // ── 5. Handle backspace / delete via beforeinput ──
  _addEventListener.call(captureField, 'beforeinput', (e) => {
    if (e.inputType === 'deleteContentBackward' || e.inputType === 'deleteContentForward') {
      e.preventDefault(); // we handle deletion manually
      if (encryptedChunks.length > 0) {
        encryptedChunks.pop();
        length--;
        updateDisplay();
      }
    }

    // Block paste — could expose plaintext
    if (e.inputType === 'insertFromPaste' || e.inputType === 'insertFromDrop') {
      e.preventDefault();
      showStatus('Paste is disabled for security.', 'error');
    }
  }, true);

  // ── 6. Block keydown snooping — prevent propagation ──
  _addEventListener.call(captureField, 'keydown', (e) => {
    e.stopImmediatePropagation(); // kill other keydown listeners

    // Allow only safe keys to propagate
    if (!['Tab', 'Enter', 'Backspace', 'Delete'].includes(e.key)) {
      // Don't preventDefault — we still need the InputEvent to fire
    }
  }, true);

  // ── 7. Block keyup snooping ──
  _addEventListener.call(captureField, 'keyup', (e) => {
    e.stopImmediatePropagation();
  }, true);

  // ── 8. Block context menu & drag ──
  _addEventListener.call(captureField, 'contextmenu', e => e.preventDefault(), true);
  _addEventListener.call(captureField, 'dragstart',   e => e.preventDefault(), true);
  _addEventListener.call(captureField, 'drop',        e => e.preventDefault(), true);

  // ── 9. Update dot display & strength ──
  function updateDisplay() {
    dotDisplay.textContent = length > 0 ? '●'.repeat(length) : '\u200B';
    updateStrength(length);
  }

  function updateStrength(len) {
    const pct   = Math.min((len / 16) * 100, 100);
    const color = len < 6 ? '#ef4444' : len < 10 ? '#f59e0b' : '#22c55e';
    const label = len < 6 ? 'Too short' : len < 10 ? 'Medium' : 'Strong';
    strengthFill.style.width     = pct + '%';
    strengthFill.style.background = color;
    hintEl.textContent           = len === 0 ? 'Start typing your password' : label;
  }

  // ── 10. Submit ──
  document.getElementById('submit-btn').addEventListener('click', async () => {
    if (length === 0) {
      showStatus('Please enter a password.', 'error');
      return;
    }

    const plain  = await decryptAll();
    const hashed = await sha256(plain);

    // Wipe plaintext from memory immediately
    // (JS doesn't guarantee GC, but we remove all references)
    encryptedChunks = [];
    length = 0;
    updateDisplay();

    showStatus(`SHA-256: ${hashed}`, 'show');

    // In production: send hashed to server
    // fetch('/auth', { method: 'POST', body: JSON.stringify({ hash: hashed }) })
  });

  // ── 11. Clear ──
  document.getElementById('clear-btn').addEventListener('click', () => {
    encryptedChunks = [];
    length = 0;
    captureField.textContent = '';
    updateDisplay();
    hideStatus();
  });

  // ── 12. SHA-256 hash ──
  async function sha256(text) {
    const buf = await _subtle.digest('SHA-256', _encode(text));
    return Array.from(new Uint8Array(buf))
      .map(b => b.toString(16).padStart(2, '0'))
      .join('');
  }

  function showStatus(msg, cls) {
    statusEl.textContent  = msg;
    statusEl.className    = cls;
  }

  function hideStatus() {
    statusEl.className    = '';
    statusEl.textContent  = '';
  }

  // ── Boot ──
  init().then(() => captureField.focus());

  // Click wrapper to focus hidden field
  document.getElementById('field-wrapper').addEventListener('click', () => {
    captureField.focus();
  });

})();
</script>
</body>
</html>
